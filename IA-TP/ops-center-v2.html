<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运营中心 v2 — EX Partner Portal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#7a1ded;--pri-l:#F3F0FF;--pri-d:#6d19d4;--green:#16a34a;--green-bg:#F0FDF4;--red:#dc2626;--red-bg:#fef2f2;--amber:#d97706;--amber-bg:#fffbeb;--blue:#2563eb;--blue-bg:#eff6ff;--gray:#9CA3AF;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--bg:#f8f8fa;--card:#fff;--bd:#E5E7EB;--bd2:#f8fafc;--nav-w:260px;--top-h:52px;--r:8px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px;}
.topbar{height:var(--top-h);background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;flex-shrink:0;z-index:300;overflow:visible;}
.brand{width:var(--nav-w);display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid var(--bd);height:100%;flex-shrink:0;}
.brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7a1ded,#6784e8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;}
.brand-name{font-size:13px;font-weight:700;}.brand-tag{font-size:10px;font-weight:600;color:var(--pri);background:var(--pri-l);padding:1px 6px;border-radius:4px;}
.gs-wrap{flex:1;display:flex;align-items:center;padding:0 16px;}
.gs{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;padding:0 12px;height:34px;width:100%;max-width:520px;transition:all .15s;}
.gs:focus-within{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l);background:#fff;}
.gs input{border:none;background:none;outline:none;font-size:13px;color:var(--text);flex:1;font-family:inherit;}
.gs input::placeholder{color:var(--text3);}
.gs-kbd{font-size:10px;color:var(--text3);border:1px solid var(--bd);padding:1px 5px;border-radius:4px;}
.topbar-r{display:flex;align-items:center;gap:8px;padding:0 14px;margin-left:auto;position:relative;z-index:400;}
.ib{width:32px;height:32px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
.ib:hover{background:var(--bg);}.ib svg{width:15px;height:15px;}
.dot-r{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--red);border:1.5px solid var(--card);}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7a1ded,#6784e8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;cursor:pointer;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--nav-w);background:var(--card);border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0;padding:16px 0 20px 0;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:var(--bd);}
.ns{padding:4px 16px 0;margin-bottom:14px;}.ns-l{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:0 12px;margin-bottom:6px;display:flex;align-items:center;cursor:pointer;user-select:none;}
.ns-l:hover{color:var(--text2);}
.ns-chevron{margin-left:auto;width:14px;height:14px;transition:transform .2s;flex-shrink:0;}
.ns.collapsed .ns-chevron{transform:rotate(-90deg);}
.ns-body{overflow:hidden;transition:max-height .25s ease;max-height:500px;}
.ns.collapsed .ns-body{max-height:0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;color:#687280;font-size:14px;font-weight:500;margin-bottom:2px;}
.ni:hover{background:#f9fafb;color:#374151;}.ni.active{background:var(--pri-l);color:var(--pri);font-weight:600;border-left:3px solid var(--pri);border-radius:0 8px 8px 0;}
.ni svg{width:16px;height:16px;flex-shrink:0;}
.nc{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#687280;font-size:14px;transition:all .15s;margin-bottom:2px;}
.nc:hover{color:#374151;background:#f9fafb;}.nc.active{background:var(--pri-l);color:var(--pri);font-weight:600;border-left:3px solid var(--pri);border-radius:0 8px 8px 0;}
.nc svg{width:16px;height:16px;flex-shrink:0;}
.main{flex:1;overflow-y:auto;padding:24px 28px;}.main::-webkit-scrollbar{width:4px;}.main::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}.pt{font-size:17px;font-weight:700;margin-bottom:1px;}.ps{font-size:12px;color:var(--text2);}
.btn{padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--card);color:var(--text2);font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--pri);color:var(--pri);}.btn-pri{background:var(--pri);color:#fff;border-color:var(--pri);}.btn-pri:hover{background:var(--pri-d);color:#fff;border-color:var(--pri-d);}
.btn-sm{padding:4px 10px;}
.fbar{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.fi{padding:5px 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;font-family:inherit;color:var(--text);outline:none;background:var(--card);height:30px;}
.fi:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l);}.fi-s{width:160px;}.fi-sel{width:130px;cursor:pointer;}.fi-date{width:130px;}
.tcard{background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.tcard-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd);}.tcard-t{font-size:13px;font-weight:600;}
table{width:100%;border-collapse:collapse;}thead tr{background:#EEF0F8;}
th{padding:12px 20px;text-align:left;font-size:12px;font-weight:600;color:#333952;letter-spacing:.02em;border-bottom:2px solid #D8DCE9;white-space:nowrap;}
td{padding:12px 20px;font-size:13px;color:#1F2937;border-bottom:1px solid #F3F4F6;vertical-align:middle;}
tr:last-child td{border-bottom:none;}tbody tr:hover td{background:#FAFAF7;}
.mono{font-family:'SF Mono',monospace;font-size:12px;color:var(--text2);}.lnk{color:var(--pri);cursor:pointer;font-weight:500;}.lnk:hover{text-decoration:underline;}
.s{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;}
.s::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.s-ok{color:var(--green);}.s-pend{color:var(--amber);}.s-proc{color:var(--pri);}.s-fail{color:var(--red);}.s-rev{color:var(--blue);}.s-gray{color:var(--gray);}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--bd2);color:var(--text2);}
.tag-p{background:var(--pri-l);color:var(--pri);}.tag-g{background:var(--green-bg);color:var(--green);}.tag-a{background:var(--amber-bg);color:var(--amber);}
.itabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px;}
.itab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap;}
.itab:hover{color:var(--text);}.itab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600;}
.ipnl{display:none;}.ipnl.active{display:block;}
.page{display:none;}.page.active{display:block;}
.pagi{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--bd);font-size:13px;color:var(--text3);}
.pagi-left{display:flex;align-items:center;gap:6px;}
.pagi-sel{padding:2px 6px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;background:var(--card);color:var(--text);}
.pagi-btns{display:flex;gap:4px;}
.pagi-btn{min-width:32px;height:32px;padding:0 8px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;}
.pagi-btn:hover{background:#f9fafb;color:var(--text);}.pagi-btn.active{background:var(--pri);color:#fff;border-radius:8px;font-weight:600;}
.pagi-btn.nav{color:var(--text3);font-size:12px;}
.empty-tab{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px;}.empty-tab .ico{font-size:36px;margin-bottom:10px;}
.search-hint{padding:60px 20px;text-align:center;color:var(--text3);font-size:13px;background:var(--card);border:1px dashed var(--bd);border-radius:10px;margin-bottom:14px;}
.search-hint .ico{font-size:40px;margin-bottom:10px;}
.maskable{cursor:pointer;border-bottom:1px dashed var(--bd);transition:all .15s;}.maskable:hover{color:var(--pri);border-bottom-color:var(--pri);}
.nc-star{margin-left:auto;font-size:13px;line-height:1;opacity:0;transition:all .15s;cursor:pointer;color:var(--text3);padding:0 2px;flex-shrink:0;}.nc:hover .nc-star{opacity:.6;}.nc-star.faved{opacity:1;color:#f59e0b;}.nc-star:hover{opacity:1!important;transform:scale(1.2);}
.av-wrap{position:relative;cursor:pointer;}.av-dd{display:none;position:absolute;top:calc(100% + 8px);right:0;width:220px;background:var(--card);border:1px solid var(--bd);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:400;overflow:hidden;}
.av-dd.show{display:block;}.av-dd-hd{padding:12px 16px;border-bottom:1px solid var(--bd);}
.av-dd-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;}.av-dd-item:hover{background:var(--bg);color:var(--text);}
.av-dd-item.danger{color:var(--red);}.av-dd-item.danger:hover{background:var(--red-bg);}
.snav{padding:8px 16px 4px;border-bottom:1px solid var(--bd);margin-bottom:4px;position:relative;}
.snav-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:14px;font-weight:600;color:var(--text);}
.snav-hd:hover{background:var(--bg);}
.snav-arrow{width:14px;height:14px;margin-left:auto;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.snav-hd.open .snav-arrow{transform:rotate(180deg);}
.snav-dd{display:none;position:absolute;left:16px;right:16px;top:100%;background:var(--card);border:1px solid var(--bd);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.1);overflow:hidden;z-index:50;}
.snav-dd.show{display:block;}
.snav-section{padding:6px 0;}.snav-section+.snav-section{border-top:1px solid var(--bd);}
.snav-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:4px 14px;}
.snav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .12s;}
.snav-item:hover{background:var(--bg);color:var(--text);}
.snav-item.active{color:var(--pri);font-weight:600;background:var(--pri-l);}
.snav-item svg{width:16px;height:16px;flex-shrink:0;}
.snav-empty{padding:8px 14px;font-size:11px;color:var(--text3);font-style:italic;}
</style>
</head>

function getPageMeta(pageId){
  for(const g of MENU) for(const item of g.items) if(item.id===pageId&&!item.isSearch) return item;
  return null;
}
function getPageCenter(pageId){
  for(let i=0;i<MENU.length;i++) for(const item of MENU[i].items){
    if(item.id===pageId){
      if(OPS_GROUPS.includes(i)) return '';
      for(const [hash,conf] of Object.entries(HASH_MAP)) if(conf.groups.includes(i)) return hash;
      return '';
    }
  }
  return '';
}

// Build sidebar — pass groupFilter array to limit which groups show
function buildSidebar(groupFilter){
  const hash=window.location.hash||'';
  const cur=CENTERS.find(c=>c.hash===hash)||CENTERS[0];
  // Favorites section
  let favHtml='';
  [...favorites].forEach(fid=>{
    const meta=getPageMeta(fid);
    if(!meta)return;
    const ico=ICONS[fid]||'';
    favHtml+=`<div class="snav-item" onclick="jumpFavPage('${fid}')">${ico}${meta.label}</div>`;
  });
  if(!favHtml) favHtml='<div class="snav-empty">暂无收藏页面</div>';
  // Nav header
  let h=`<div class="snav"><div class="snav-hd" onclick="toggleNavSwitcher(event)">${cur.icon.replace('width="2"','width="2" style="width:18px;height:18px;flex-shrink:0"')}<span>${cur.name}</span><svg class="snav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>`;
  h+=`<div class="snav-dd" id="navSwitcher"><div class="snav-section"><div class="snav-label">切换中心</div>`;
  CENTERS.forEach(c=>{
    h+=`<div class="snav-item${c.hash===hash?' active':''}" onclick="switchCenter('${c.hash}')">${c.icon}${c.name}</div>`;
  });
  h+=`</div><div class="snav-section"><div class="snav-label">常用页面</div>${favHtml}</div></div></div>`;
  // Menu groups
  MENU.forEach((g,gi)=>{
    if(groupFilter && !groupFilter.includes(gi)) return;
    const hasActive=g.items.some(it=>it.id===activePageId);
    const collapsed=!hasActive&&!g.items.some(it=>it.isSearch);
    h+=`<div class="ns${collapsed?' collapsed':''}" data-gi="${gi}"><div class="ns-l" onclick="toggleGroup(this)">${g.label}<svg class="ns-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="ns-body">`;
    if(g.items.length===1&&g.items[0].isSearch){
      h+=`<div class="ni" onclick="alert('\u5168\u5c40\u641c\u7d22\u529f\u80fd\u5f00\u53d1\u4e2d')">${ICONS['search']||''} ${g.items[0].label}</div>`;
    } else {
      g.items.forEach(it=>{
        const ico=ICONS[it.id]||'';
        h+=`<div class="nc" data-page="${it.id}" onclick="showPage('${it.id}',this)">${ico}<span style="flex:1">${it.label}</span><span class="nc-star${favorites.has(it.id)?' faved':''}" onclick="event.stopPropagation();toggleFav('${it.id}',this)" title="收藏到常用页面">${favorites.has(it.id)?'★':'☆'}</span></div>`;
      });
    }
    h+=`</div></div>`;
  });
  document.getElementById('sidebar').innerHTML=h;
}

function toggleGroup(labelEl){
  const ns=labelEl.closest('.ns');
  if(ns) ns.classList.toggle('collapsed');
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nc').forEach(n=>n.classList.remove('active'));
  const pg=document.getElementById('page-'+id);
  if(pg){pg.classList.add('active');activePageId=id;}
  if(el){el.classList.add('active');const ns=el.closest('.ns');if(ns)ns.classList.remove('collapsed');}
}

function switchInnerTab(group,idx,el){
  const parent=el.closest('.page')||el.closest('.main');
  parent.querySelectorAll('.itabs .itab').forEach(t=>{if(t.closest('.itabs')===el.closest('.itabs'))t.classList.remove('active');});
  el.classList.add('active');
  const prefix='ipnl-'+group+'-';
  parent.querySelectorAll('[id^="'+prefix+'"]').forEach(p=>p.classList.remove('active'));
  const tgt=document.getElementById(prefix+idx);
  if(tgt)tgt.classList.add('active');
}

function doSearch(btn){
  const container=btn.closest('.ipnl')||btn.closest('.page')||btn.parentElement.parentElement;
  if(!container)return;
  const h=container.querySelector('.search-hint');
  if(h)h.style.display='none';
  container.querySelectorAll('.tcard').forEach(c=>{if(c.style.display==='none')c.style.display='';});
}

// ── Hash → menu group/page mapping ──
const HASH_MAP = {
  '#finance':  { groups: [7, 8], page: 'fin-receivable' },
  '#settings': { groups: [9, 10], page: 'set-ticket' }
};
// 运营中心 (default/no hash): groups 0-6
const OPS_GROUPS = [0,1,2,3,4,5,6];

// ── Nav switcher ──
function toggleNavSwitcher(e){
  e.stopPropagation();
  const dd=document.getElementById('navSwitcher');
  const hd=e.currentTarget;
  dd.classList.toggle('show');
  hd.classList.toggle('open');
}
function closeNavSwitcher(){
  const dd=document.getElementById('navSwitcher');
  if(dd)dd.classList.remove('show');
  const hd=document.querySelector('.snav-hd');
  if(hd)hd.classList.remove('open');
}
function switchCenter(newHash){
  closeNavSwitcher();
  const currentHash=window.location.hash||'';
  if(newHash===currentHash) return;
  const base=window.location.pathname;
  window.location.href=base+(newHash||'');
  window.location.reload();
}
function jumpFavPage(pageId){
  closeNavSwitcher();
  const targetCenter=getPageCenter(pageId);
  const currentHash=window.location.hash||'';
  if(targetCenter===currentHash){
    const navItem=document.querySelector(`.nc[data-page="${pageId}"]`);
    if(navItem) showPage(pageId,navItem);
  } else {
    const base=window.location.pathname;
    window.location.href=base+'?page='+pageId+targetCenter;
    window.location.reload();
  }
}

// ── Avatar dropdown & Language toggle ──
function toggleAvMenu(e){e.stopPropagation();document.getElementById('avDropdown').classList.toggle('show');}
function closeAvMenu(){document.getElementById('avDropdown').classList.remove('show');}
document.addEventListener('click',function(){closeAvMenu();closeNavSwitcher();});
function toggleLang(){const btn=document.querySelector('.ib[title]');const isEn=document.documentElement.lang==='en';document.documentElement.lang=isEn?'zh-CN':'en';if(btn)btn.title=isEn?'Switch Language':'切换语言';}

// ── INIT ──
function init(){
  // Determine which sidebar groups to show based on hash
  const hash = window.location.hash;
  const target = HASH_MAP[hash];
  const sidebarFilter = target ? target.groups : OPS_GROUPS;
  buildSidebar(sidebarFilter);
  // Build all page panels
  const ma=document.getElementById('mainArea');
  Object.keys(PAGES).forEach(id=>{
    const d=document.createElement('div');
    d.className='page'+(id==='home'?' active':'');
    d.id='page-'+id;
    d.innerHTML=PAGES[id];
    ma.appendChild(d);
  });

  // Check hash for auto-navigation (from workbench overlay)
  const hashNames = { '#finance': '财资中心', '#settings': '设置中心' };

  // Update brand tag if hash-based center
  if (hashNames[hash]) {
    const tag = document.querySelector('.brand-tag');
    if (tag) tag.textContent = hashNames[hash];
  }

  // Hide topbar when embedded in iframe (workbench overlay has its own header)
  if (window !== window.top) {
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.style.display = 'none';
  }

  // Handle ?page= parameter (from workbench favorites) — takes priority
  const urlParams=new URLSearchParams(window.location.search);
  const targetPage=urlParams.get('page');
  if(targetPage){
    const navItem=document.querySelector(`.nc[data-page="${targetPage}"]`);
    if(navItem) showPage(targetPage,navItem);
  } else if (target) {
    const navItem = document.querySelector(`.nc[data-page="${target.page}"]`);
    if (navItem) showPage(target.page, navItem);
  }
}
init();
</script>
