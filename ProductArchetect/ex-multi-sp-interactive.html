<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EX 多 SP 关键页面交互原型</title>
  <style>
    :root{--bg:#f6f4fb;--panel:#fff;--ink:#1f2937;--muted:#667085;--line:#e6e8ef;--blue:#2764ff;--purple:#7c3aed;--green:#07966f;--amber:#c87217;--red:#d33d4a;--nav:#17162a;--shadow:0 12px 34px rgba(27,25,66,.08);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.sidebar{background:var(--nav);color:#fff;padding:22px 14px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:10px;padding:0 10px 25px;font-size:18px;font-weight:800}.logo{width:36px;height:36px;display:grid;place-items:center;border-radius:10px;background:linear-gradient(135deg,#4f7cff,#8b5cf6)}.nav-label{padding:15px 12px 7px;color:#8e8ba7;font-size:11px;font-weight:800;letter-spacing:.08em}.nav{display:grid;gap:5px}.nav button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border:0;border-radius:8px;background:transparent;color:#c9c7d8;text-align:left}.nav button:hover,.nav button.active{background:#2a2843;color:#fff}.nav i{width:23px;font-style:normal;text-align:center}.sidebar-note{position:absolute;left:14px;right:14px;bottom:18px;padding:12px;border:1px solid #373451;border-radius:9px;color:#aaa7bd;font-size:12px;line-height:1.5}
    main{min-width:0}.topbar{height:70px;padding:0 30px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.merchant{display:flex;align-items:center;gap:10px;font-size:13px}.avatar{width:34px;height:34px;border-radius:50%;background:#ede9fe;color:#6d28d9;display:grid;place-items:center;font-weight:800}.content{padding:28px 30px 50px;max-width:1440px;margin:auto}.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:22px}.page-head h1{font-size:25px;margin:0 0 7px}.sub{color:var(--muted);font-size:14px;line-height:1.55}.actions{display:flex;gap:9px;flex-wrap:wrap}.btn{min-height:40px;padding:0 15px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#344054;font-weight:700}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.purple{background:var(--purple);border-color:var(--purple);color:#fff}.btn:disabled{opacity:.45;cursor:not-allowed}
    .grid{display:grid;gap:16px}.summary-grid{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:18px}.metric,.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 4px 14px rgba(27,25,66,.025)}.metric{padding:18px}.metric span{display:block;color:var(--muted);font-size:12px;margin-bottom:9px}.metric b{font-size:23px}.metric small{display:block;color:var(--green);margin-top:7px}.card{padding:20px}.card h2,.card h3{margin:0}.section-head{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:15px}.section-head h2{font-size:18px}.account-stack{display:grid;gap:12px}.account{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}.account-head{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;padding:16px}.account-icon{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-weight:850}.bb{background:#ede9fe;color:#6d28d9}.ipl{background:#e7f0ff;color:#1d56c7}.kun{background:#fff1df;color:#ad5d09}.account-title{font-weight:800}.account-title small{font-weight:600;color:var(--muted);margin-left:6px}.account-desc{color:var(--muted);font-size:12px;margin-top:4px}.balance{text-align:right}.balance b{display:block;font-size:18px}.balance span{color:var(--muted);font-size:12px}.account-body{border-top:1px solid var(--line);background:#fafbfc;padding:12px 16px;display:flex;gap:9px;flex-wrap:wrap}.coin{padding:7px 10px;background:#fff;border:1px solid var(--line);border-radius:7px;font-size:13px}.coin b{margin-left:7px}.tag{display:inline-flex;align-items:center;min-height:24px;padding:0 8px;border-radius:999px;background:#eef4ff;color:#2455bd;font-size:11px;font-weight:750}.tag.green{background:#eaf9f4;color:#087657}.tag.amber{background:#fff4e7;color:#a6570d}.tag.gray{background:#f0f1f4;color:#626b78}.notice{padding:13px 15px;border:1px solid #cfe0ff;background:#f4f8ff;border-radius:8px;color:#335b9d;font-size:13px;line-height:1.55}
    .table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px}.table th{text-align:left;color:var(--muted);background:#fafbfc;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}.table td{padding:13px 12px;border-bottom:1px solid var(--line);vertical-align:top}.table tr:last-child td{border-bottom:0}.link{color:var(--blue);font-weight:700;text-decoration:none}.amount.out{color:#b42318}.amount.in{color:#087657}.status{display:inline-flex;padding:4px 8px;border-radius:999px;background:#eaf9f4;color:#087657;font-size:11px;font-weight:750}.status.processing{background:#fff4e7;color:#a6570d}.status.failed{background:#fff0f1;color:#b42332}.filters{display:grid;grid-template-columns:1.4fr repeat(3,minmax(150px,.65fr)) auto;gap:10px;margin-bottom:16px}.field{display:grid;gap:7px}.field label{font-size:12px;color:#475467;font-weight:700}.field input,.field select,.field textarea{min-height:42px;border:1px solid #d5d9e2;border-radius:8px;padding:9px 11px;background:#fff;outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(39,100,255,.1)}
    .detail-grid{grid-template-columns:1.15fr .85fr}.kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}.kv div{padding:13px;border-bottom:1px solid var(--line)}.kv div:nth-child(odd){border-right:1px solid var(--line)}.kv div:nth-last-child(-n+2){border-bottom:0}.kv span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.timeline{display:grid;gap:0}.event{display:grid;grid-template-columns:20px 1fr;gap:10px;position:relative;padding-bottom:20px}.event:before{content:"";position:absolute;left:7px;top:15px;bottom:0;width:1px;background:#d8dee8}.event:last-child:before{display:none}.dot{width:15px;height:15px;border-radius:50%;background:var(--green);border:4px solid #dff6ee}.event b{display:block;font-size:13px}.event span{color:var(--muted);font-size:12px}
    .form-layout{grid-template-columns:minmax(0,1fr) 360px}.form-section{padding:18px 0;border-bottom:1px solid var(--line)}.form-section:first-child{padding-top:0}.form-section:last-child{border-bottom:0}.form-section h3{font-size:15px;margin-bottom:13px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}.account-choice{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.choice{position:relative;border:1px solid var(--line);border-radius:8px;padding:13px;cursor:pointer}.choice input{position:absolute;opacity:0}.choice.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(39,100,255,.09);background:#f7f9ff}.choice b{display:block;font-size:13px}.choice span{display:block;color:var(--muted);font-size:11px;margin-top:5px}.summary{position:sticky;top:90px}.summary-row{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}.summary-row span{color:var(--muted)}.summary-row b{text-align:right}.summary-total{font-size:16px}.check{display:flex;align-items:flex-start;gap:9px;margin:14px 0;color:#475467;font-size:12px;line-height:1.5}.check input{margin-top:3px}.error{color:var(--red);font-size:12px;margin-top:8px}.modal-mask{position:fixed;inset:0;background:rgba(15,14,28,.56);display:grid;place-items:center;padding:20px;z-index:20}.modal{width:min(520px,100%);background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:24px}.modal h2{margin:0 0 8px}.success-icon{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:#e8f8f2;color:var(--green);font-size:26px;font-weight:900;margin-bottom:15px}
    .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px}.tabs button{border:0;background:transparent;padding:10px 13px;color:var(--muted);font-weight:700;border-bottom:2px solid transparent}.tabs button.active{color:var(--blue);border-color:var(--blue)}
    @media(max-width:1000px){.summary-grid{grid-template-columns:repeat(2,1fr)}.detail-grid,.form-layout{grid-template-columns:1fr}.summary{position:static}.filters{grid-template-columns:1fr 1fr}.app{grid-template-columns:76px 1fr}.sidebar{padding:20px 10px}.brand span,.nav button span,.nav-label,.sidebar-note{display:none}.brand{padding:0 10px 24px}.nav button{justify-content:center}.nav i{font-size:18px}.content{padding:22px 18px}.topbar{padding:0 18px}}
    @media(max-width:640px){.summary-grid,.form-row,.account-choice,.kv{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.app{grid-template-columns:1fr}.sidebar{height:auto;position:static;display:flex;align-items:center;overflow:auto}.brand{padding:0 10px}.nav-label{display:none}.nav{display:flex}.nav button{width:auto}.topbar{display:none}.page-head{display:block}.page-head .actions{margin-top:13px}.account-head{grid-template-columns:42px 1fr}.balance{grid-column:2;text-align:left}.kv div:nth-child(odd){border-right:0}.kv div{border-bottom:1px solid var(--line)!important}.kv div:last-child{border-bottom:0!important}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">EX</div><span>EurewaX</span></div>
    <div class="nav-label">资金管理</div>
    <nav class="nav">
      <button class="active" data-page="accounts"><i>▦</i><span>账户</span></button>
      <button data-page="transactions"><i>↔</i><span>交易</span></button>
      <button data-page="payment"><i>↗</i><span>付款</span></button>
      <button data-page="transfer"><i>⇄</i><span>资金调拨</span></button>
    </nav>
    <div class="nav-label">其他</div>
    <nav class="nav"><button data-page="settings"><i>⚙</i><span>账户设置</span></button></nav>
    <div class="sidebar-note">交互讨论稿<br>示例余额与交易均为模拟数据，不代表真实资金动作。</div>
  </aside>
  <main>
    <header class="topbar"><div><b>资金工作台</b> <span class="sub">· 多 SP 账户视图</span></div><div class="merchant"><div class="avatar">BL</div><div><b>BrightLink Trading</b><br><span class="sub">企业管理员</span></div></div></header>
    <div id="page" class="content"></div>
  </main>
</div>
<div id="modalRoot"></div>
<script>
  const transactions = [
    {id:'TXN-20260719-0182',time:'2026-07-19 10:42',type:'全球收款',account:'全球资金账户 · IPL',currency:'USD',amount:'+ 28,650.00',status:'成功',cls:'in'},
    {id:'TXN-20260719-0176',time:'2026-07-19 09:18',type:'资金调拨',account:'BB 法币账户 → 鲲鹏结算账户',currency:'CNH',amount:'- 120,000.00',status:'处理中',cls:'out'},
    {id:'TXN-20260718-1643',time:'2026-07-18 16:30',type:'数字资产收款',account:'数字资产账户 · BB',currency:'USDT',amount:'+ 45,000.00',status:'成功',cls:'in'},
    {id:'TXN-20260718-1511',time:'2026-07-18 15:08',type:'全球付款',account:'全球资金账户 · IPL',currency:'EUR',amount:'- 8,320.00',status:'成功',cls:'out'},
    {id:'TXN-20260717-0935',time:'2026-07-17 09:35',type:'数法兑换',account:'数字资产账户 · BB',currency:'USDC → USD',amount:'10,000.00',status:'成功',cls:''},
    {id:'TXN-20260716-1421',time:'2026-07-16 14:21',type:'人民币结算',account:'人民币跨境结算账户 · 鲲鹏',currency:'CNH',amount:'- 75,000.00',status:'失败',cls:'out'}
  ];
  const meta={
    accounts:['账户','分别管理 BB、IPL 与鲲鹏承载的真实资金余额。'],transactions:['交易','统一查询交易，但保留每笔交易的资金账户与服务主体。'],payment:['发起付款','从已开通的 BB 或 IPL 账户发起付款，系统不展示 SP 列表。'],transfer:['资金调拨','将同一主体名下资金从 BB 的 CNH 账户调拨至鲲鹏 CNH 结算账户。'],settings:['账户设置','查看账户服务主体、签约状态和可用能力。']
  };
  function head(page,actions=''){const [t,s]=meta[page];return `<div class="page-head"><div><h1>${t}</h1><div class="sub">${s}</div></div><div class="actions">${actions}</div></div>`}
  function accountsPage(){return head('accounts','<button class="btn" data-go="transactions">查看交易</button><button class="btn primary" data-go="payment">发起付款</button>')+`
    <div class="summary-grid grid"><div class="metric"><span>折合总资产 · 统计视图</span><b>USD 328,420.65</b><small>不代表跨主体资金已归集</small></div><div class="metric"><span>本月收款</span><b>USD 186,430</b><small>较上月 +12.6%</small></div><div class="metric"><span>本月付款</span><b>USD 92,180</b><small>成功率 98.7%</small></div><div class="metric"><span>处理中</span><b>3 笔</b><small style="color:var(--amber)">含 1 笔 CNH 调拨</small></div></div>
    <div class="notice" style="margin-bottom:16px"><b>账户展示规则：</b>BB、IPL 与鲲鹏是不同资金主体。同币种余额分别展示，不合并为一个可用余额；顶部总资产仅用于统计。</div>
    <div class="card"><div class="section-head"><h2>我的账户</h2><span class="tag gray">3 个服务主体</span></div><div class="account-stack">
      ${account('BB','数字资产收付与兑换','BB','同时承载法币与数字资产账户','bb','USD 128,240.65',[['USD','72,240.65'],['CNH','180,000.00'],['USDT','45,000.00'],['USDC','10,000.00']],'accounts-bb')}
      ${account('A','全球资金收付','IPL','仅承载法币账户','ipl','USD 156,800.00',[['USD','98,500.00'],['EUR','41,200.00'],['GBP','12,640.00']],'accounts-ipl')}
      ${account('鲲','人民币跨境结算','鲲鹏','仅承载 CNH 专项结算账户','kun','CNH 300,000.00',[['CNH','300,000.00'],['可结算额度','225,000.00']],'accounts-kun')}
    </div></div>`}
  function account(icon,title,provider,desc,cls,total,coins,id){return `<div class="account"><div class="account-head"><div class="account-icon ${cls}">${icon}</div><div><div class="account-title">${title}<small>由 ${provider} 提供</small></div><div class="account-desc">${desc}</div></div><div class="balance"><b>${total}</b><span>账户余额</span></div></div><div class="account-body">${coins.map(c=>`<span class="coin">${c[0]} <b>${c[1]}</b></span>`).join('')}<button class="btn" style="margin-left:auto;min-height:32px" data-detail="${id}">查看详情</button></div></div>`}
  function detailPage(kind){const d=kind==='accounts-bb'?{title:'数字资产收付与兑换',provider:'BB',desc:'BB 同时提供法币账户、数字资产账户与数法兑换能力。',items:[['服务主体','BlancBlock（BB）'],['账户关系','商户独立入网'],['法币账户','USD、CNH'],['数字资产账户','USDT、USDC'],['账户状态','正常'],['协议版本','BB-MSA-2026.04']]}:kind==='accounts-ipl'?{title:'全球资金收付',provider:'IPL',desc:'IPL 仅承载法币账户，用于全球收款、付款与换汇。',items:[['服务主体','iPayLinks（IPL）'],['账户关系','商户独立入网'],['账户类型','法币账户'],['支持币种','USD、EUR、GBP'],['账户状态','正常'],['协议版本','IPL-MSA-2026.06']]}:{title:'人民币跨境结算',provider:'鲲鹏',desc:'鲲鹏仅承载 CNH 专项账户；资金调入后按订单明细形成可结算额度。',items:[['服务主体','鲲鹏'],['账户关系','专项结算入网'],['账户类型','CNH 结算账户'],['可用余额','CNH 300,000.00'],['可结算额度','CNH 225,000.00'],['申报人状态','已报备']]};return `<div class="page-head"><div><button class="btn" data-go="accounts">← 返回账户</button><h1 style="margin-top:16px">${d.title}</h1><div class="sub">${d.desc}</div></div><span class="tag green">账户正常</span></div><div class="detail-grid grid"><div class="card"><div class="section-head"><h2>账户信息</h2><span class="tag">由 ${d.provider} 提供</span></div><div class="kv">${d.items.map(x=>`<div><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div></div><div class="card"><div class="section-head"><h2>最近活动</h2></div><div class="timeline"><div class="event"><i class="dot"></i><div><b>账户余额已同步</b><span>2026-07-19 10:45</span></div></div><div class="event"><i class="dot"></i><div><b>交易对账完成</b><span>2026-07-19 09:00</span></div></div><div class="event"><i class="dot"></i><div><b>服务协议有效</b><span>2026-07-01 00:00</span></div></div></div></div></div>`}
  function transactionsPage(){return head('transactions','<button class="btn" id="exportBtn">导出记录</button>')+`<div class="card"><div class="filters"><div class="field"><input id="searchTx" aria-label="搜索交易" placeholder="搜索订单号或账户"></div><div class="field"><select id="typeFilter" aria-label="交易类型"><option value="">全部类型</option><option>全球收款</option><option>全球付款</option><option>数字资产收款</option><option>数法兑换</option><option>资金调拨</option><option>人民币结算</option></select></div><div class="field"><select id="accountFilter" aria-label="服务主体"><option value="">全部服务主体</option><option>BB</option><option>IPL</option><option>鲲鹏</option></select></div><div class="field"><select id="statusFilter" aria-label="状态"><option value="">全部状态</option><option>成功</option><option>处理中</option><option>失败</option></select></div><button class="btn primary" id="filterBtn">查询</button></div><div class="table-wrap"><table class="table"><thead><tr><th>交易单号 / 时间</th><th>交易类型</th><th>资金账户</th><th>币种</th><th>金额</th><th>状态</th></tr></thead><tbody id="txBody">${txRows(transactions)}</tbody></table></div></div>`}
  function txRows(rows){return rows.map(x=>`<tr><td><a href="#" class="link tx-link">${x.id}</a><br><span class="sub">${x.time}</span></td><td>${x.type}</td><td>${x.account}</td><td>${x.currency}</td><td class="amount ${x.cls}"><b>${x.amount}</b></td><td><span class="status ${x.status==='处理中'?'processing':x.status==='失败'?'failed':''}">${x.status}</span></td></tr>`).join('')||'<tr><td colspan="6" class="sub" style="text-align:center;padding:35px">没有符合条件的交易</td></tr>'}
  function paymentPage(){return head('payment')+`<div class="form-layout grid"><div class="card"><div class="form-section"><h3>1. 选择付款账户</h3><div class="account-choice" id="payChoices"><label class="choice selected"><input type="radio" name="payAccount" value="IPL" checked><b>全球资金账户 · IPL</b><span>USD 可用 98,500.00 · 仅法币</span></label><label class="choice"><input type="radio" name="payAccount" value="BB"><b>数字资产收付与兑换 · BB</b><span>USD、CNH、USDT、USDC</span></label></div></div><div class="form-section"><h3>2. 填写收款信息</h3><div class="form-row"><div class="field"><label>收款人</label><select id="beneficiary"><option value="">请选择已验证收款人</option><option>Shenzhen Supplier A · BOC **** 8821</option><option>Blue Ocean Media · DBS **** 3906</option></select></div><div class="field"><label>付款币种</label><select id="payCurrency"><option>USD</option><option>EUR</option><option>GBP</option></select></div><div class="field"><label>付款金额</label><input id="payAmount" inputmode="decimal" placeholder="0.00"></div><div class="field"><label>付款用途</label><select><option>货物贸易</option><option>服务贸易</option><option>广告及平台费用</option></select></div></div></div><div class="form-section"><h3>3. 补充信息</h3><div class="field"><label>付款备注</label><textarea rows="3" placeholder="填写合同号、发票号或付款说明"></textarea></div></div></div><aside class="card summary"><h2 style="font-size:18px">付款概要</h2><div class="summary-row"><span>服务主体</span><b id="payProvider">IPL</b></div><div class="summary-row"><span>扣款账户</span><b id="payAccountSummary">全球资金账户</b></div><div class="summary-row"><span>付款金额</span><b id="payAmountSummary">--</b></div><div class="summary-row"><span>预计手续费</span><b>12.00 USD</b></div><div class="summary-row summary-total"><span>预计扣款</span><b id="payTotal">--</b></div><label class="check"><input id="payConfirm" type="checkbox">我已核对收款人、扣款账户及服务主体信息。</label><div id="payError" class="error"></div><button class="btn primary" id="submitPay" style="width:100%">确认付款</button></aside></div>`}
  function transferPage(){return head('transfer')+`<div class="notice" style="margin-bottom:16px"><b>适用范围：</b>该操作仅用于同一商户主体在 BB 与鲲鹏之间的 CNH 资金调拨。鲲鹏仅接受 CNH，不支持 USD、CNY 或数字资产直接调入。</div><div class="form-layout grid"><div class="card"><div class="form-section"><h3>1. 调拨路径</h3><div class="kv"><div><span>转出账户</span><b>BB · CNH 法币账户</b></div><div><span>转入账户</span><b>鲲鹏 · CNH 结算账户</b></div><div><span>可用余额</span><b>CNH 180,000.00</b></div><div><span>申报人状态</span><b style="color:var(--green)">已报备</b></div></div></div><div class="form-section"><h3>2. 调拨金额</h3><div class="form-row"><div class="field"><label>调拨币种</label><input value="CNH" disabled></div><div class="field"><label>调拨金额</label><input id="transferAmount" inputmode="decimal" placeholder="不超过 180,000.00"></div></div></div><div class="form-section"><h3>3. 资金用途</h3><div class="field"><label>用途说明</label><select id="transferPurpose"><option value="">请选择</option><option>人民币跨境结算备付</option><option>订单结算</option></select></div></div></div><aside class="card summary"><h2 style="font-size:18px">调拨概要</h2><div class="summary-row"><span>资金主体变化</span><b>BB → 鲲鹏</b></div><div class="summary-row"><span>调拨金额</span><b id="transferSummary">--</b></div><div class="summary-row"><span>调拨手续费</span><b>CNH 20.00</b></div><div class="summary-row"><span>预计到账</span><b>1 个工作日内</b></div><label class="check"><input id="transferConfirm" type="checkbox">我确认资金调入后由鲲鹏承载，并按照人民币跨境结算规则使用。</label><div id="transferError" class="error"></div><button class="btn purple" id="submitTransfer" style="width:100%">确认调拨</button></aside></div>`}
  function settingsPage(){return head('settings')+`<div class="card"><div class="section-head"><h2>已开通服务</h2><span class="tag gray">不提供 SP 市场</span></div><div class="table-wrap"><table class="table"><thead><tr><th>产品能力</th><th>服务主体</th><th>账户范围</th><th>签约状态</th><th>操作</th></tr></thead><tbody><tr><td><b>数字资产收付与兑换</b></td><td>BB</td><td>法币 + 数字资产</td><td><span class="status">已生效</span></td><td><a class="link" href="#">查看协议</a></td></tr><tr><td><b>全球资金收付</b></td><td>IPL</td><td>仅法币</td><td><span class="status">已生效</span></td><td><a class="link" href="#">查看协议</a></td></tr><tr><td><b>人民币跨境结算</b></td><td>鲲鹏</td><td>仅 CNH</td><td><span class="status">已生效</span></td><td><a class="link" href="#">查看协议</a></td></tr></tbody></table></div></div>`}
  function modal(title,text){document.getElementById('modalRoot').innerHTML=`<div class="modal-mask"><div class="modal"><div class="success-icon">✓</div><h2>${title}</h2><p class="sub">${text}</p><div class="actions" style="justify-content:flex-end;margin-top:20px"><button class="btn primary" id="closeModal">完成</button></div></div></div>`;document.getElementById('closeModal').onclick=()=>document.getElementById('modalRoot').innerHTML=''}
  function bind(page){document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>render(b.dataset.go));document.querySelectorAll('[data-detail]').forEach(b=>b.onclick=()=>{document.getElementById('page').innerHTML=detailPage(b.dataset.detail);bind('detail')});
    if(page==='transactions'){document.getElementById('filterBtn').onclick=()=>{const q=document.getElementById('searchTx').value.toLowerCase(),t=document.getElementById('typeFilter').value,a=document.getElementById('accountFilter').value,s=document.getElementById('statusFilter').value;document.getElementById('txBody').innerHTML=txRows(transactions.filter(x=>(!q||(x.id+x.account).toLowerCase().includes(q))&&(!t||x.type===t)&&(!a||x.account.includes(a))&&(!s||x.status===s)))};document.getElementById('exportBtn').onclick=()=>modal('导出任务已创建','模拟交互：系统将按当前筛选条件生成交易文件。')}
    if(page==='payment'){document.querySelectorAll('#payChoices .choice').forEach(c=>c.onclick=()=>{document.querySelectorAll('#payChoices .choice').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');const v=c.querySelector('input').value,sel=document.getElementById('payCurrency');document.getElementById('payProvider').textContent=v;document.getElementById('payAccountSummary').textContent=v==='IPL'?'全球资金账户':'数字资产收付与兑换';sel.innerHTML=v==='IPL'?'<option>USD</option><option>EUR</option><option>GBP</option>':'<option>USD</option><option>CNH</option><option>USDT</option><option>USDC</option>';updatePay()});document.getElementById('payAmount').oninput=updatePay;document.getElementById('payCurrency').onchange=updatePay;document.getElementById('submitPay').onclick=()=>{const e=document.getElementById('payError');if(!document.getElementById('beneficiary').value||!Number(document.getElementById('payAmount').value)||!document.getElementById('payConfirm').checked){e.textContent='请填写收款人、有效金额并确认信息。';return}e.textContent='';modal('付款申请已提交','模拟交互：申请进入安全验证，验证完成后由对应服务主体执行。')}}
    if(page==='transfer'){document.getElementById('transferAmount').oninput=()=>{const n=Number(document.getElementById('transferAmount').value);document.getElementById('transferSummary').textContent=n?`CNH ${n.toLocaleString('en-US',{minimumFractionDigits:2})}`:'--'};document.getElementById('submitTransfer').onclick=()=>{const n=Number(document.getElementById('transferAmount').value),e=document.getElementById('transferError');if(!n||n>180000||!document.getElementById('transferPurpose').value||!document.getElementById('transferConfirm').checked){e.textContent=n>180000?'调拨金额不能超过可用余额 CNH 180,000.00。':'请填写有效金额、资金用途并确认资金主体变化。';return}e.textContent='';modal('调拨申请已提交','模拟交互：BB 出款与鲲鹏入账将生成两笔关联交易，状态可在交易页面查询。')}}
  }
  function updatePay(){const n=Number(document.getElementById('payAmount').value),c=document.getElementById('payCurrency').value;document.getElementById('payAmountSummary').textContent=n?`${c} ${n.toLocaleString('en-US',{minimumFractionDigits:2})}`:'--';document.getElementById('payTotal').textContent=n&&c==='USD'?`USD ${(n+12).toLocaleString('en-US',{minimumFractionDigits:2})}`:(n?`${c} ${n.toLocaleString('en-US',{minimumFractionDigits:2})} + 费用`:'--')}
  function render(page){const pages={accounts:accountsPage,transactions:transactionsPage,payment:paymentPage,transfer:transferPage,settings:settingsPage};document.getElementById('page').innerHTML=pages[page]();document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));bind(page);window.scrollTo(0,0)}
  document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>render(b.dataset.page));render('accounts');
</script>
</body>
</html>
