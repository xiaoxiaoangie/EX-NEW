<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style><![CDATA[
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; color: #fff; }
      .root { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
      .title { font-size: 56px; font-weight: 800; letter-spacing: 2px; margin-bottom: 60px; }
      .row { display: flex; align-items: center; justify-content: center; gap: 40px; }
      .item { font-size: 26px; font-weight: 700; white-space: nowrap; }
      .item .sub { font-size: 14px; font-weight: 500; opacity: 0.9; margin-left: 8px; }
      .divider { width: 1px; height: 44px; background: rgba(255,255,255,0.55); }
    ]]></style>
  </defs>

  <rect width="100%" height="100%" fill="#0B5DBB"/>

  <foreignObject x="0" y="0" width="1920" height="1080">
    <div xmlns="http://www.w3.org/1999/xhtml" class="root">
      <div class="title">投资机构</div>
      <div class="row">
        <div class="item">KAIROUS</div>
        <div class="divider"></div>
        <div class="item">Tencent 腾讯</div>
        <div class="divider"></div>
        <div class="item"><span>君联资本</span><span class="sub">LEGEND CAPITAL</span></div>
        <div class="divider"></div>
        <div class="item">凤凰祥瑞</div>
        <div class="divider"></div>
        <div class="item"><span>元璟资本</span><span class="sub">Vision+ Capital</span></div>
      </div>
    </div>
  </foreignObject>
</svg>
