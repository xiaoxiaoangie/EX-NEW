  text-decoration-style: dashed;

b,

  width: 100%;
  padding: 0;

  corner-shape: superellipse(1.5);
  color: var(--card-foreground);

  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {

  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(

    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {

  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));

  flex-direction: column;
  gap: 2px;

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {

  color: var(--accent-foreground);
  background: var(--accent);

.text-muted {

.sr-only {

  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;

.viz-controls {

  flex-wrap: wrap;

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {

}

.btn-primary {

  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {

.form-label {

  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {

  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);

  background: var(--secondary);

  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));

.form-control-color[type=&quot;color&quot;] {

}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,

  cursor: not-allowed;
  opacity: 0.4;
}

  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);

  background-color: var(--secondary);

.form-select:not(:disabled):hover {

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);

    border-color 150ms,
    box-shadow 150ms;

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {

  height: 100%;

  height: 14px;

  background:

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);

.form-range {
  appearance: none;
  display: block;

  height: 28px;

  background: linear-gradient(

  height: 20px;
  margin-top: 4px;

  background: light-dark(var(--primary-foreground), var(--foreground));

  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {

}

        { id: 3, type: &#x27;非境内企业&#x27;, name: &#x27;Northstar Commerce Pte. Ltd.&#x27;, en: &#x27;NORTHSTAR COMMERCE PTE. LTD.&#x27;, country: &#x27;SGP&#x27;, status: &#x27;审核中&#x27;, use: &#x27;不可用&#x27;, scene: &#x27;服务费&#x27; }
      ];
      let selectedReviewId = null;

      const views = [&#x27;list&#x27;, &#x27;form&#x27;, &#x27;review&#x27;, &#x27;payment&#x27;];
      const showView = (name) =&gt; {
        views.forEach(v =&gt; root.querySelector(&#x27;#view-&#x27; + v).classList.toggle(&#x27;hidden&#x27;, v !== name));
        root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(btn =&gt; {
          const active = btn.dataset.view === name || (name === &#x27;form&#x27; &amp;&amp; btn.dataset.view === &#x27;list&#x27;);
          btn.classList.toggle(&#x27;btn-primary&#x27;, active);
          btn.classList.toggle(&#x27;btn-ghost&#x27;, !active);
        });
        if (name === &#x27;review&#x27;) renderReview();
        if (name === &#x27;payment&#x27;) renderPaymentOptions();
      };

      const statusBadge = (status) =&gt; `&lt;span class=&quot;viz-badge&quot;&gt;${status}&lt;/span&gt;`;
      const renderList = () =&gt; {
        const q = root.querySelector(&#x27;#search-name&#x27;).value.trim().toLowerCase();
        const type = root.querySelector(&#x27;#filter-type&#x27;).value;
        const status = root.querySelector(&#x27;#filter-status&#x27;).value;
        const filtered = payers.filter(p =&gt; (!q || (p.name + p.en).toLowerCase().includes(q)) &amp;&amp; (!type || p.type === type) &amp;&amp; (!status || p.status === status));
        const tbody = root.querySelector(&#x27;#payer-rows&#x27;);
        tbody.innerHTML = filtered.map(p =&gt; `&lt;tr&gt;&lt;td&gt;${p.type}&lt;/td&gt;&lt;td&gt;${p.name}&lt;/td&gt;&lt;td&gt;${p.en}&lt;/td&gt;&lt;td&gt;${p.country}&lt;/td&gt;&lt;td&gt;${statusBadge(p.status)}&lt;/td&gt;&lt;td&gt;${p.use}&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;actions&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-detail=&quot;${p.id}&quot;&gt;详情&lt;/button&gt;${p.status === &#x27;审核中&#x27; ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-go-review=&quot;${p.id}&quot;&gt;去审核&lt;/button&gt;` : &#x27;&#x27;}&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
        root.querySelector(&#x27;#list-empty&#x27;).classList.toggle(&#x27;hidden&#x27;, filtered.length &gt; 0);
        tbody.querySelectorAll(&#x27;[data-go-review]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; { selectedReviewId = Number(btn.dataset.goReview); showView(&#x27;review&#x27;); }));
        tbody.querySelectorAll(&#x27;[data-detail]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; {
          const p = payers.find(x =&gt; x.id === Number(btn.dataset.detail));
          alert(`${p.name}\n类型：${p.type}\n国家/地区：${p.country}\n审核状态：${p.status}\n使用状态：${p.use}`);
        }));
      };

      const setStep = (step) =&gt; {
        [1, 2, 3].forEach(n =&gt; root.querySelector(&#x27;#form-step-&#x27; + n).classList.toggle(&#x27;hidden&#x27;, n !== step));
        root.querySelectorAll(&#x27;[data-step-label]&#x27;).forEach(el =&gt; el.classList.toggle(&#x27;active&#x27;, Number(el.dataset.stepLabel) === step));
        if (step === 3) {
          const type = root.querySelector(&#x27;input[name=&quot;payerType&quot;]:checked&#x27;).value;
          const facts = [
            [&#x27;付款人类型&#x27;, type], [&#x27;国家/地区&#x27;, root.querySelector(&#x27;#payer-country&#x27;).value],
            [&#x27;付款人名称&#x27;, root.querySelector(&#x27;#payer-name&#x27;).value], [&#x27;英文名&#x27;, root.querySelector(&#x27;#payer-en&#x27;).value],
            [&#x27;关系&#x27;, root.querySelector(&#x27;#payer-relation&#x27;).value], [&#x27;使用场景&#x27;, root.querySelector(&#x27;#payer-scene&#x27;).value]
          ];
          root.querySelector(&#x27;#confirm-facts&#x27;).innerHTML = facts.map(([k, v]) =&gt; `&lt;div class=&quot;fact&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;${k}&lt;/span&gt;&lt;span&gt;${v || &#x27;未填写&#x27;}&lt;/span&gt;&lt;/div&gt;`).join(&#x27;&#x27;);
        }
      };

      const renderReview = () =&gt; {
        const queue = payers.filter(p =&gt; [&#x27;审核中&#x27;, &#x27;待补件&#x27;].includes(p.status));
        const tbody = root.querySelector(&#x27;#review-rows&#x27;);
        tbody.innerHTML = queue.map(p =&gt; `&lt;tr&gt;&lt;td&gt;${p.name}&lt;/td&gt;&lt;td&gt;${p.type}&lt;/td&gt;&lt;td&gt;${p.scene}&lt;/td&gt;&lt;td&gt;${statusBadge(p.status)}&lt;/td&gt;&lt;td&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-review-id=&quot;${p.id}&quot;&gt;选择&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
        root.querySelector(&#x27;#review-empty&#x27;).classList.toggle(&#x27;hidden&#x27;, queue.length &gt; 0);
        tbody.querySelectorAll(&#x27;[data-review-id]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; selectReview(Number(btn.dataset.reviewId))));
        if (selectedReviewId &amp;&amp; queue.some(p =&gt; p.id === selectedReviewId)) selectReview(selectedReviewId);
      };

      const selectReview = (id) =&gt; {
        selectedReviewId = id;
        const p = payers.find(x =&gt; x.id === id);
        root.querySelector(&#x27;#review-selected&#x27;).textContent = `${p.name} · ${p.type} · ${p.country} · ${p.scene}`;
        root.querySelector(&#x27;#need-more&#x27;).disabled = false;
        root.querySelector(&#x27;#approve&#x27;).disabled = false;
      };

      const decideReview = (decision) =&gt; {
        const p = payers.find(x =&gt; x.id === selectedReviewId);
        if (!p) return;
        p.status = decision;
        p.use = decision === &#x27;审核通过&#x27; ? &#x27;正常&#x27; : &#x27;不可用&#x27;;
        selectedReviewId = null;
        root.querySelector(&#x27;#review-selected&#x27;).textContent = `已处理：${p.name} → ${decision}`;
        root.querySelector(&#x27;#need-more&#x27;).disabled = true;
        root.querySelector(&#x27;#approve&#x27;).disabled = true;
        renderReview();
        renderList();
      };

      const renderPaymentOptions = () =&gt; {
        const approved = payers.filter(p =&gt; p.status === &#x27;审核通过&#x27; &amp;&amp; p.use === &#x27;正常&#x27;);
        const select = root.querySelector(&#x27;#payment-payer&#x27;);
        select.innerHTML = approved.length ? approved.map(p =&gt; `&lt;option value=&quot;${p.id}&quot;&gt;${p.name} · ${p.country}&lt;/option&gt;`).join(&#x27;&#x27;) : &#x27;&lt;option value=&quot;&quot;&gt;暂无可用付款人&lt;/option&gt;&#x27;;
      };

      root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; showView(btn.dataset.view)));
      root.querySelector(&#x27;#add-payer&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { root.querySelector(&#x27;#payer-form&#x27;).reset(); setStep(1); showView(&#x27;form&#x27;); });
      root.querySelector(&#x27;#back-list&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; showView(&#x27;list&#x27;));
      root.querySelector(&#x27;#query-btn&#x27;).addEventListener(&#x27;click&#x27;, renderList);
      root.querySelector(&#x27;#search-name&#x27;).addEventListener(&#x27;input&#x27;, renderList);
      root.querySelectorAll(&#x27;[data-next]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; {
        const step = Number(btn.dataset.next);
        if (step === 2 &amp;&amp; (!root.querySelector(&#x27;#payer-country&#x27;).value || !root.querySelector(&#x27;#payer-name&#x27;).value || !root.querySelector(&#x27;#payer-en&#x27;).value || !root.querySelector(&#x27;#payer-id&#x27;).value)) {
          root.querySelector(&#x27;#payer-form&#x27;).reportValidity(); return;
        }
        if (step === 3 &amp;&amp; (!root.querySelector(&#x27;#payer-relation&#x27;).value || !root.querySelector(&#x27;#payer-scene&#x27;).value)) {
          root.querySelector(&#x27;#payer-form&#x27;).reportValidity(); return;
        }
        setStep(step);
      }));
      root.querySelectorAll(&#x27;[data-prev]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; setStep(Number(btn.dataset.prev))));
      root.querySelector(&#x27;#payer-form&#x27;).addEventListener(&#x27;submit&#x27;, (event) =&gt; {
        event.preventDefault();
        const type = root.querySelector(&#x27;input[name=&quot;payerType&quot;]:checked&#x27;).value;
        payers.unshift({ id: Date.now(), type, name: root.querySelector(&#x27;#payer-name&#x27;).value, en: root.querySelector(&#x27;#payer-en&#x27;).value, country: root.querySelector(&#x27;#payer-country&#x27;).value, status: &#x27;审核中&#x27;, use: &#x27;不可用&#x27;, scene: root.querySelector(&#x27;#payer-scene&#x27;).value });
        renderList();
        showView(&#x27;list&#x27;);
      });
      root.querySelector(&#x27;#need-more&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; decideReview(&#x27;待补件&#x27;));
      root.querySelector(&#x27;#approve&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; decideReview(&#x27;审核通过&#x27;));
      root.querySelector(&#x27;#payment-form&#x27;).addEventListener(&#x27;submit&#x27;, event =&gt; {
        event.preventDefault();
        const payerId = Number(root.querySelector(&#x27;#payment-payer&#x27;).value);
        const payer = payers.find(p =&gt; p.id === payerId);
        const result = root.querySelector(&#x27;#payment-result&#x27;);
        result.classList.remove(&#x27;hidden&#x27;);
        result.textContent = payer ? `交易级风控通过，已锁定付款人快照：${payer.name}。付款指令已提交至 A 的银行通道。` : &#x27;没有可用的 POBO 付款人，无法提交。&#x27;;
      });
      root.querySelectorAll(&#x27;input[name=&quot;payerType&quot;]&#x27;).forEach(radio =&gt; radio.addEventListener(&#x27;change&#x27;, event =&gt; {
        const type = event.target.value;
        root.querySelector(&#x27;#doc-type&#x27;).value = type === &#x27;境内企业&#x27; ? &#x27;营业执照&#x27; : type === &#x27;个人&#x27; ? &#x27;护照&#x27; : &#x27;企业注册证书&#x27;;
      }));

      renderList();
      if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
