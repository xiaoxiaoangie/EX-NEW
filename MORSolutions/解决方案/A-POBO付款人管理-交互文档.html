.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;a-pobo-lifecycle&quot;&gt;
  &lt;style&gt;
    #a-pobo-lifecycle { color: var(--foreground); max-width: 1080px; margin: 0 auto; }

    #a-pobo-lifecycle .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    #a-pobo-lifecycle .head-copy { display: grid; gap: 4px; }
    #a-pobo-lifecycle .toolbar { display: grid; grid-template-columns: minmax(180px, 1fr) 160px 180px auto; gap: 8px; align-items: end; margin-bottom: 12px; }
    #a-pobo-lifecycle .table-wrap { overflow-x: auto; }
    #a-pobo-lifecycle table { width: 100%; border-collapse: collapse; min-width: 820px; }
    #a-pobo-lifecycle th, #a-pobo-lifecycle td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
    #a-pobo-lifecycle th { color: var(--muted-foreground); font-weight: 500; }
    #a-pobo-lifecycle .row-actions, #a-pobo-lifecycle .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    #a-pobo-lifecycle .actions { justify-content: flex-end; margin-top: 16px; }
    #a-pobo-lifecycle .form-section { padding-block: 14px; border-bottom: 1px solid var(--border); }
    #a-pobo-lifecycle .form-section:last-of-type { border-bottom: 0; }
    #a-pobo-lifecycle .form-section h3 { margin-top: 0; }
    #a-pobo-lifecycle .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 13px 18px; }
    #a-pobo-lifecycle .full { grid-column: 1 / -1; }
    #a-pobo-lifecycle .radio-row { display: flex; gap: 16px; flex-wrap: wrap; }
    #a-pobo-lifecycle .upload { display: grid; gap: 8px; padding: 14px; border: 1px dashed var(--border); }
    #a-pobo-lifecycle .notice { padding: 10px 12px; border-left: 3px solid var(--viz-series-1); background: color-mix(in srgb, var(--viz-series-1) 11%, transparent); margin-bottom: 12px; }
    #a-pobo-lifecycle dialog { width: min(620px, calc(100% - 32px)); max-height: calc(100% - 32px); overflow: auto; color: var(--popover-foreground); background: var(--popover); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    #a-pobo-lifecycle dialog::backdrop { background: color-mix(in srgb, var(--background) 35%, transparent); backdrop-filter: blur(2px); }
    #a-pobo-lifecycle .dialog-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    #a-pobo-lifecycle .summary { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 20px; margin: 16px 0; }
    #a-pobo-lifecycle .summary-item { display: grid; gap: 3px; }
    #a-pobo-lifecycle .danger-note { padding: 10px 12px; color: var(--destructive); border-left: 3px solid var(--destructive); background: color-mix(in srgb, var(--destructive) 9%, transparent); }
    @media (max-width: 720px) {
      #a-pobo-lifecycle .toolbar, #a-pobo-lifecycle .grid, #a-pobo-lifecycle .summary { grid-template-columns: 1fr; }
      #a-pobo-lifecycle .actions .btn { flex: 1; }
    }
  &lt;/style&gt;

  &lt;section id=&quot;list-view&quot;&gt;

  &lt;section id=&quot;form-view&quot; class=&quot;hidden&quot;&gt;
    &lt;div class=&quot;head&quot;&gt;
      &lt;div class=&quot;head-copy&quot;&gt;&lt;h2 id=&quot;form-title&quot;&gt;新增 POBO 付款人&lt;/h2&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;点击提交后先确认关键信息，再进入审核流程&lt;/span&gt;&lt;/div&gt;

    &lt;form id=&quot;payer-form&quot; class=&quot;card&quot;&gt;
      &lt;section class=&quot;form-section&quot;&gt;
        &lt;h3&gt;付款人基本信息&lt;/h3&gt;
        &lt;div class=&quot;grid&quot;&gt;
          &lt;fieldset class=&quot;full&quot;&gt;&lt;legend class=&quot;form-label&quot;&gt;付款人类型 *&lt;/legend&gt;&lt;div class=&quot;radio-row&quot;&gt;
            &lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;radio&quot; name=&quot;payerType&quot; value=&quot;非境内企业&quot; checked&gt;&lt;span class=&quot;form-check-label&quot;&gt;非境内企业&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;radio&quot; name=&quot;payerType&quot; value=&quot;境内企业&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;境内企业&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;radio&quot; name=&quot;payerType&quot; value=&quot;个人&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;个人&lt;/span&gt;&lt;/label&gt;
          &lt;/div&gt;&lt;/fieldset&gt;
          &lt;label class=&quot;form-label&quot;&gt;国家/地区 *&lt;select id=&quot;country&quot; class=&quot;form-select&quot; required&gt;&lt;option value=&quot;&quot;&gt;请选择&lt;/option&gt;&lt;option&gt;HKG-中国香港&lt;/option&gt;&lt;option&gt;CHN-中国&lt;/option&gt;&lt;option&gt;SGP-新加坡&lt;/option&gt;&lt;option&gt;USA-美国&lt;/option&gt;&lt;/select&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;付款人名称 *&lt;input id=&quot;name&quot; class=&quot;form-control&quot; required placeholder=&quot;请输入证件上的完整名称&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;付款人英文名 *&lt;input id=&quot;english-name&quot; class=&quot;form-control&quot; required placeholder=&quot;请输入官方英文名称&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;证件类型 *&lt;select id=&quot;doc-type&quot; class=&quot;form-select&quot;&gt;&lt;option&gt;企业注册证书&lt;/option&gt;&lt;option&gt;营业执照&lt;/option&gt;&lt;option&gt;护照&lt;/option&gt;&lt;option&gt;身份证&lt;/option&gt;&lt;/select&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;证件/注册号码 *&lt;input id=&quot;doc-number&quot; class=&quot;form-control&quot; required placeholder=&quot;请输入号码&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label full&quot;&gt;注册地址/居住地址 *&lt;input id=&quot;address&quot; class=&quot;form-control&quot; required placeholder=&quot;请输入完整地址&quot;&gt;&lt;/label&gt;
        &lt;/div&gt;
      &lt;/section&gt;
      &lt;section class=&quot;form-section&quot; id=&quot;company-fields&quot;&gt;
        &lt;h3&gt;企业控制人信息&lt;/h3&gt;

          &lt;label class=&quot;form-label&quot;&gt;董事/法人姓名 *&lt;input id=&quot;director&quot; class=&quot;form-control company-required&quot; required placeholder=&quot;请输入姓名&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;最终受益人姓名 *&lt;input id=&quot;ubo&quot; class=&quot;form-control company-required&quot; required placeholder=&quot;持股或控制超过 25%&quot;&gt;&lt;/label&gt;

          &lt;label class=&quot;form-label full&quot;&gt;业务关系说明 *&lt;textarea id=&quot;purpose&quot; class=&quot;form-control&quot; rows=&quot;3&quot; required placeholder=&quot;说明真实业务关系&quot;&gt;&lt;/textarea&gt;&lt;/label&gt;
          &lt;div class=&quot;upload full&quot;&gt;&lt;span&gt;合作关系证明材料 *&lt;/span&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;合同、订单、Invoice、付款授权书；支持 PDF/JPG/PNG&lt;/span&gt;&lt;input id=&quot;files&quot; class=&quot;form-control&quot; type=&quot;file&quot; multiple accept=&quot;.pdf,.jpg,.jpeg,.png&quot;&gt;&lt;/div&gt;

  &lt;dialog id=&quot;submit-dialog&quot; aria-labelledby=&quot;submit-title&quot;&gt;

    &lt;div class=&quot;actions&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-close-submit&gt;返回修改&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;confirm-submit&quot;&gt;确认并提交&lt;/button&gt;&lt;/div&gt;

  &lt;dialog id=&quot;delete-dialog&quot; aria-labelledby=&quot;delete-title&quot;&gt;

    &lt;p id=&quot;delete-copy&quot;&gt;&lt;/p&gt;
    &lt;div class=&quot;danger-note&quot;&gt;删除后不可恢复。已提交审核或已产生历史记录的付款人不能删除。&lt;/div&gt;
    &lt;div class=&quot;actions&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;cancel-delete&quot;&gt;取消&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; id=&quot;confirm-delete&quot;&gt;确认删除&lt;/button&gt;&lt;/div&gt;
  &lt;/dialog&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;a-pobo-lifecycle&#x27;);
      const form = root.querySelector(&#x27;#payer-form&#x27;);
      const listView = root.querySelector(&#x27;#list-view&#x27;);
      const formView = root.querySelector(&#x27;#form-view&#x27;);
      const submitDialog = root.querySelector(&#x27;#submit-dialog&#x27;);
      const deleteDialog = root.querySelector(&#x27;#delete-dialog&#x27;);
      let editId = null;
      let deleteId = null;
      let rows = [
        { id: 1, type: &#x27;非境内企业&#x27;, name: &#x27;Porsin Limited&#x27;, en: &#x27;PORSIN LIMITED&#x27;, country: &#x27;HKG-中国香港&#x27;, status: &#x27;审核通过&#x27;, use: &#x27;正常&#x27;, relation: &#x27;客户/买方&#x27;, scene: &#x27;出口货款&#x27;, doc: &#x27;HK-889912&#x27;, address: &#x27;Hong Kong&#x27;, director: &#x27;Chan Tai Man&#x27;, ubo: &#x27;Chan Tai Man&#x27;, purpose: &#x27;B2B出口货款&#x27; },
        { id: 2, type: &#x27;境内企业&#x27;, name: &#x27;上海示例贸易有限公司&#x27;, en: &#x27;SHANGHAI SAMPLE TRADING CO., LTD.&#x27;, country: &#x27;CHN-中国&#x27;, status: &#x27;草稿&#x27;, use: &#x27;不可用&#x27;, relation: &#x27;关联公司&#x27;, scene: &#x27;采购货款&#x27;, doc: &#x27;91310000EXAMPLE&#x27;, address: &#x27;上海市浦东新区&#x27;, director: &#x27;张三&#x27;, ubo: &#x27;李四&#x27;, purpose: &#x27;集团采购代付&#x27; },
        { id: 3, type: &#x27;非境内企业&#x27;, name: &#x27;Northstar Commerce Pte. Ltd.&#x27;, en: &#x27;NORTHSTAR COMMERCE PTE. LTD.&#x27;, country: &#x27;SGP-新加坡&#x27;, status: &#x27;审核中&#x27;, use: &#x27;不可用&#x27;, relation: &#x27;客户/买方&#x27;, scene: &#x27;服务费&#x27;, doc: &#x27;202612345Z&#x27;, address: &#x27;Singapore&#x27;, director: &#x27;Lim Wei&#x27;, ubo: &#x27;Lim Wei&#x27;, purpose: &#x27;跨境服务费&#x27; },
        { id: 4, type: &#x27;非境内企业&#x27;, name: &#x27;Pacific Buyer LLC&#x27;, en: &#x27;PACIFIC BUYER LLC&#x27;, country: &#x27;USA-美国&#x27;, status: &#x27;待补件&#x27;, use: &#x27;不可用&#x27;, relation: &#x27;客户/买方&#x27;, scene: &#x27;出口货款&#x27;, doc: &#x27;US-77218&#x27;, address: &#x27;California, USA&#x27;, director: &#x27;Alex Lee&#x27;, ubo: &#x27;Alex Lee&#x27;, purpose: &#x27;B2B出口货款&#x27; }
      ];

      const typeValue = () =&gt; root.querySelector(&#x27;input[name=&quot;payerType&quot;]:checked&#x27;).value;
      const showList = () =&gt; { formView.classList.add(&#x27;hidden&#x27;); listView.classList.remove(&#x27;hidden&#x27;); renderRows(); };
      const showForm = () =&gt; { listView.classList.add(&#x27;hidden&#x27;); formView.classList.remove(&#x27;hidden&#x27;); };
      const setType = type =&gt; { const radio = root.querySelector(`input[name=&quot;payerType&quot;][value=&quot;${type}&quot;]`); if (radio) radio.checked = true; updateType(); };
      const updateType = () =&gt; { const company = typeValue() !== &#x27;个人&#x27;; root.querySelector(&#x27;#company-fields&#x27;).classList.toggle(&#x27;hidden&#x27;, !company); root.querySelectorAll(&#x27;.company-required&#x27;).forEach(i =&gt; { i.required = company; }); root.querySelector(&#x27;#doc-type&#x27;).value = typeValue() === &#x27;境内企业&#x27; ? &#x27;营业执照&#x27; : typeValue() === &#x27;个人&#x27; ? &#x27;护照&#x27; : &#x27;企业注册证书&#x27;; };
      const badge = status =&gt; `&lt;span class=&quot;viz-badge&quot;&gt;${status}&lt;/span&gt;`;

      const actionsFor = row =&gt; {
        if (row.status === &#x27;草稿&#x27;) return `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-edit=&quot;${row.id}&quot;&gt;编辑&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-delete=&quot;${row.id}&quot;&gt;删除&lt;/button&gt;`;
        if (row.status === &#x27;审核中&#x27;) return &#x27;&lt;span class=&quot;text-small text-muted&quot;&gt;审核中不可操作&lt;/span&gt;&#x27;;
        if (row.status === &#x27;待补件&#x27; || row.status === &#x27;审核拒绝&#x27;) return `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-edit=&quot;${row.id}&quot;&gt;修改并重新提交&lt;/button&gt;`;
        if (row.status === &#x27;审核通过&#x27;) return `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-edit=&quot;${row.id}&quot;&gt;修改&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-stop=&quot;${row.id}&quot;&gt;停用&lt;/button&gt;`;
        return &#x27;&lt;span class=&quot;text-small text-muted&quot;&gt;仅查看&lt;/span&gt;&#x27;;
      };

      const renderRows = () =&gt; {
        const query = root.querySelector(&#x27;#search-input&#x27;).value.trim().toLowerCase();
        const status = root.querySelector(&#x27;#status-filter&#x27;).value;
        const country = root.querySelector(&#x27;#country-filter&#x27;).value;
        const filtered = rows.filter(r =&gt; (!query || (r.name + r.en).toLowerCase().includes(query)) &amp;&amp; (!status || r.status === status) &amp;&amp; (!country || r.country === country));
        const body = root.querySelector(&#x27;#payer-rows&#x27;);
        body.innerHTML = filtered.map(r =&gt; `&lt;tr&gt;&lt;td&gt;${r.type}&lt;/td&gt;&lt;td&gt;${r.name}&lt;/td&gt;&lt;td&gt;${r.en}&lt;/td&gt;&lt;td&gt;${r.country}&lt;/td&gt;&lt;td&gt;${badge(r.status)}&lt;/td&gt;&lt;td&gt;${r.use}&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;row-actions&quot;&gt;${actionsFor(r)}&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
        body.querySelectorAll(&#x27;[data-edit]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; openEdit(Number(button.dataset.edit))));
        body.querySelectorAll(&#x27;[data-delete]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; openDelete(Number(button.dataset.delete))));
        body.querySelectorAll(&#x27;[data-stop]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; { const row = rows.find(r =&gt; r.id === Number(button.dataset.stop)); row.use = &#x27;已停用&#x27;; renderRows(); }));
      };

      const clearForm = () =&gt; { form.reset(); editId = null; root.querySelector(&#x27;#form-title&#x27;).textContent = &#x27;新增 POBO 付款人&#x27;; updateType(); };
      const openEdit = id =&gt; {
        const row = rows.find(r =&gt; r.id === id); if (!row) return;
        editId = id; form.reset(); setType(row.type);
        root.querySelector(&#x27;#name&#x27;).value = row.name; root.querySelector(&#x27;#english-name&#x27;).value = row.en; root.querySelector(&#x27;#country&#x27;).value = row.country;
        root.querySelector(&#x27;#doc-number&#x27;).value = row.doc; root.querySelector(&#x27;#address&#x27;).value = row.address; root.querySelector(&#x27;#relation&#x27;).value = row.relation;
        root.querySelector(&#x27;#scene&#x27;).value = row.scene; root.querySelector(&#x27;#purpose&#x27;).value = row.purpose; root.querySelector(&#x27;#director&#x27;).value = row.director || &#x27;&#x27;; root.querySelector(&#x27;#ubo&#x27;).value = row.ubo || &#x27;&#x27;;
        root.querySelector(&#x27;#truth&#x27;).checked = true; root.querySelector(&#x27;#form-title&#x27;).textContent = row.status === &#x27;草稿&#x27; ? &#x27;编辑付款人草稿&#x27; : &#x27;修改 POBO 付款人&#x27;; showForm();
      };

      const collect = status =&gt; ({ id: editId || Date.now(), type: typeValue(), name: root.querySelector(&#x27;#name&#x27;).value, en: root.querySelector(&#x27;#english-name&#x27;).value, country: root.querySelector(&#x27;#country&#x27;).value, status, use: status === &#x27;审核通过&#x27; ? &#x27;正常&#x27; : &#x27;不可用&#x27;, relation: root.querySelector(&#x27;#relation&#x27;).value, scene: root.querySelector(&#x27;#scene&#x27;).value, doc: root.querySelector(&#x27;#doc-number&#x27;).value, address: root.querySelector(&#x27;#address&#x27;).value, director: root.querySelector(&#x27;#director&#x27;).value, ubo: root.querySelector(&#x27;#ubo&#x27;).value, purpose: root.querySelector(&#x27;#purpose&#x27;).value });
      const saveRow = status =&gt; { const item = collect(status); const index = rows.findIndex(r =&gt; r.id === item.id); if (index &gt;= 0) rows[index] = item; else rows.unshift(item); return item; };
      const summaryItem = (label, value) =&gt; `&lt;div class=&quot;summary-item&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;${label}&lt;/span&gt;&lt;span&gt;${value || &#x27;未填写&#x27;}&lt;/span&gt;&lt;/div&gt;`;
      const fillSummary = () =&gt; { const data = collect(&#x27;审核中&#x27;); root.querySelector(&#x27;#submit-summary&#x27;).innerHTML = [[&#x27;付款人类型&#x27;, data.type], [&#x27;国家/地区&#x27;, data.country], [&#x27;付款人名称&#x27;, data.name], [&#x27;英文名&#x27;, data.en], [&#x27;证件号码&#x27;, data.doc], [&#x27;关系&#x27;, data.relation], [&#x27;使用场景&#x27;, data.scene], [&#x27;提交结果&#x27;, &#x27;审核中&#x27;]].map(x =&gt; summaryItem(x[0], x[1])).join(&#x27;&#x27;); };

      const openDelete = id =&gt; { const row = rows.find(r =&gt; r.id === id); if (!row || row.status !== &#x27;草稿&#x27;) return; deleteId = id; root.querySelector(&#x27;#delete-copy&#x27;).textContent = `确定删除付款人草稿“${row.name}”吗？`; deleteDialog.showModal(); };

      root.querySelector(&#x27;#add-btn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { clearForm(); showForm(); });
      root.querySelector(&#x27;#back-btn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; showList());
      root.querySelector(&#x27;#search-btn&#x27;).addEventListener(&#x27;click&#x27;, renderRows);
      root.querySelector(&#x27;#search-input&#x27;).addEventListener(&#x27;input&#x27;, renderRows);
      root.querySelector(&#x27;#status-filter&#x27;).addEventListener(&#x27;change&#x27;, renderRows);
      root.querySelector(&#x27;#country-filter&#x27;).addEventListener(&#x27;change&#x27;, renderRows);
      root.querySelectorAll(&#x27;input[name=&quot;payerType&quot;]&#x27;).forEach(radio =&gt; radio.addEventListener(&#x27;change&#x27;, updateType));
      root.querySelector(&#x27;#save-draft&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { if (!root.querySelector(&#x27;#name&#x27;).value.trim()) { root.querySelector(&#x27;#name&#x27;).focus(); return; } saveRow(&#x27;草稿&#x27;); clearForm(); showList(); });
      form.addEventListener(&#x27;submit&#x27;, event =&gt; { event.preventDefault(); if (!form.reportValidity()) return; fillSummary(); submitDialog.showModal(); });
      root.querySelectorAll(&#x27;[data-close-submit]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; submitDialog.close()));
      root.querySelector(&#x27;#confirm-submit&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { saveRow(&#x27;审核中&#x27;); submitDialog.close(); clearForm(); showList(); });
      root.querySelector(&#x27;#cancel-delete&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { deleteId = null; deleteDialog.close(); });
      root.querySelector(&#x27;#confirm-delete&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { rows = rows.filter(r =&gt; r.id !== deleteId); deleteDialog.close(); deleteId = null; renderRows(); });

      updateType(); renderRows();
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);

  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {

    }

  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }

  const handleFocusIn = (event) =&gt; {

  const handleContextMenu = (event) =&gt; {

    }

    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);

&lt;/script&gt;
